# Skip: lifecycle test has behavioral differences - delete on published PR succeeds without
# propose-delete in v1alpha2 (webhook validation gap), and error message formats differ.
# Fix the webhook/controller behavior before enabling.
skip: "v1alpha2 lifecycle behavioral gaps - webhook validation and error format differences"
usesPorchTestRepo: true
commands:
  - args:
      - porchctl
      - repo
      - register
      - --namespace=rpkg-lifecycle
      - --name=git
      - --v1alpha2
      - --repo-basic-password=secret
      - --repo-basic-username=porch
      - http://gitea.gitea.svc.cluster.local:3000/porch/porch-test
  - args:
      - porchctl
      - rpkg
      - init
      - --api-version=v1alpha2
      - --namespace=rpkg-lifecycle
      - --repository=git
      - --workspace=lifecycle
      - lifecycle-package
    stdout: |
      git.lifecycle-package.lifecycle created
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - propose
      - --api-version=v1alpha2
      - --namespace=rpkg-lifecycle
      - git.lifecycle-package.lifecycle
    stdout: |
      git.lifecycle-package.lifecycle proposed
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - propose-delete
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
    stderr: |
      can only propose published packages for deletion; package git.lifecycle-package.lifecycle is not published
    containsErrorString: true
    exitCode: 1
  - args:
      - porchctl
      - rpkg
      - get
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
      - --output=custom-columns=NAME:.metadata.name,PKG:.spec.packageName,REV:.status.revision,LIFECYCLE:.spec.lifecycle
    stdout: |
      NAME                              PKG                 REV      LIFECYCLE
      git.lifecycle-package.lifecycle   lifecycle-package   <none>   Proposed
  - args:
      - porchctl
      - rpkg
      - reject
      - --api-version=v1alpha2
      - --namespace=rpkg-lifecycle
      - git.lifecycle-package.lifecycle
    stdout: |
      git.lifecycle-package.lifecycle no longer proposed for approval
  - args:
      - porchctl
      - rpkg
      - get
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
    stdout: |
      NAME                              PACKAGE             WORKSPACENAME   REVISION   LATEST   LIFECYCLE   REPOSITORY   AGE
      git.lifecycle-package.lifecycle   lifecycle-package   lifecycle       <none>     <none>   Draft       git
    ignoreWhitespace: true
  - args:
      - porchctl
      - rpkg
      - propose-delete
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
    stderr: |
