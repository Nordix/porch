  - args:
      - porchctl
      - rpkg
      - get
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
    stdout: |
      NAME                              PACKAGE             WORKSPACENAME   REVISION   LATEST   LIFECYCLE   REPOSITORY   AGE
      git.lifecycle-package.lifecycle   lifecycle-package   lifecycle       <none>     <none>   Proposed    git
    ignoreWhitespace: true
  - args:
      - porchctl
      - rpkg
      - approve
      - --api-version=v1alpha2
      - --namespace=rpkg-lifecycle
      - git.lifecycle-package.lifecycle
    stdout: |
      git.lifecycle-package.lifecycle approved
    waitForReady: true
  - args:
      - porchctl
      - rpkg
      - get
      - --api-version=v1alpha2
      - git.lifecycle-package.lifecycle
      - --namespace=rpkg-lifecycle
    stdout: |
      NAME                              PACKAGE             WORKSPACENAME   REVISION   LATEST   LIFECYCLE   REPOSITORY   AGE
      git.lifecycle-package.lifecycle   lifecycle-package   lifecycle       1          true     Published   git
    ignoreWhitespace: true
  - args:
      - porchctl
      - rpkg
      - delete
